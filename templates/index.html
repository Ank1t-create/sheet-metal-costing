<!DOCTYPE html>
<html>
<head>
    <title>Sheet Metal Costing Software</title>

    <style>
        body{
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;

    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

/* background animation */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

        .box{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    width:600px;
    margin:100px auto;
    padding:50px;
    border-radius:20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);

    text-align:center;
    color:white;
}

       h2{
    color:#e0e0e0;
    font-weight:normal;
}
        h2{
    color:#e0e0e0;
    font-weight:normal;
}

        p{
            font-size:20px;
        }

       button{
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color:white;
    border:none;
    padding:15px 40px;
    font-size:20px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,114,255,0.6);
}
    </style>
</head>

<body>

<div class="box">

<h1>Welcome to Sheet Metal Costing</h1>

<h2>Sheet Metal Costing Software</h2>

<p>
Developed by <b>Ankit Kumar Mishra</b>
</p>

<br>

<form action="/calculator">
    <button type="submit">Start Calculator</button>
</form>

</div>

</body>
</html>
