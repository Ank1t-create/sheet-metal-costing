<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheet Metal Part Costing</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'IBM Plex Sans',sans-serif;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

background:
linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
linear-gradient(135deg,#0b1320,#121c2b,#0b1320);

background-size:
40px 40px,
40px 40px,
cover;

position:relative;

color:white;

}

body::before{

content:"⚙";

position:absolute;

font-size:260px;

left:8%;
top:12%;

opacity:.05;

transform:rotate(-20deg);

}

body::after{

content:"⚙";

position:absolute;

font-size:320px;

right:7%;
bottom:8%;

opacity:.05;

transform:rotate(18deg);

}

.card{

width:700px;

padding:60px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border-radius:20px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 20px 50px rgba(0,0,0,.45);

text-align:center;

z-index:10;

}

.logo{

font-size:65px;

color:#ff7a1c;

margin-bottom:18px;

}

h1{

font-family:'Oswald',sans-serif;

font-size:46px;

letter-spacing:1px;

margin-bottom:15px;

}

.subtitle{

font-size:18px;

color:#d2d2d2;

margin-bottom:30px;

}

.tech{

display:flex;

justify-content:center;

gap:35px;

margin-bottom:35px;

font-size:32px;

color:#ff7a1c;

}

.tech i{

transition:.3s;

}

.tech i:hover{

transform:scale(1.2);

}

button{

padding:18px 45px;

font-size:18px;

font-weight:bold;

background:#ff7a1c;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

transition:.3s;

box-shadow:0 10px 25px rgba(255,122,28,.35);

}

button:hover{

transform:translateY(-4px);

background:#ff9445;

}

.developer{

margin-top:35px;

font-size:15px;

color:#cfcfcf;

letter-spacing:.5px;

}

.developer span{

color:#ff9445;

font-weight:bold;

}

.version{

margin-top:10px;

font-size:13px;

color:#888;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<i class="fa-solid fa-gears"></i>

</div>

<h1>Sheet Metal Part Costing Software</h1>

<p class="subtitle">

Automotive Manufacturing Cost Estimation Tool

</p>

<div class="tech">

<i class="fa-solid fa-industry"></i>

<i class="fa-solid fa-gears"></i>

<i class="fa-solid fa-screwdriver-wrench"></i>

<i class="fa-solid fa-ruler-combined"></i>

</div>

<a href="/calculator">

<button>

<i class="fa-solid fa-calculator"></i>

&nbsp;

Start Calculator

</button>

</a>

<div class="developer">

Developed by <span>Ankit Mishra</span>

</div>

<div class="version">

Mechanical Engineering • Python • Flask

</div>

</div>

</body>

</html>
