<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheet Metal Costing Software</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --steel-dark:#12181f;
    --steel-panel:#1a232d;
    --grid-line:rgba(143,163,184,0.08);
    --accent:#ff6b35;
    --text-main:#eef2f5;
    --text-mute:#8fa3b8;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
      var(--steel-dark);
    background-size: 40px 40px, 40px 40px, 100% 100%;
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--text-main);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
  }

  .sheet{
    position:relative;
    width:100%;
    max-width:620px;
    background:var(--steel-panel);
    border:1px solid rgba(143,163,184,0.25);
    padding:60px 50px 0;
  }

  /* CAD-style corner registration marks */
  .sheet::before, .sheet::after,
  .corner-tl, .corner-br{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    border:2px solid var(--accent);
  }
  .sheet::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .sheet::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .corner-tl{ top:-1px; right:-1px; border-left:none; border-bottom:none; }
  .corner-br{ bottom:-1px; left:-1px; border-right:none; border-top:none; }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:3px;
    color:var(--accent);
    text-align:center;
    text-transform:uppercase;
  }

  h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:42px;
    letter-spacing:1px;
    text-transform:uppercase;
    text-align:center;
    margin:14px 0 6px;
    line-height:1.15;
  }

  .subtitle{
    text-align:center;
    color:var(--text-mute);
    font-size:15px;
    margin-bottom:36px;
  }

  /* Laser-cut styled CTA */
  form{ display:flex; justify-content:center; margin-bottom:50px; }

  button{
    position:relative;
    background:var(--accent);
    color:#12181f;
    border:none;
    font-family:'IBM Plex Mono', monospace;
    font-weight:500;
    font-size:15px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:16px 44px;
    cursor:pointer;
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }

  button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 18px rgba(255,107,53,0.35);
  }

  /* Technical drawing title block */
  .title-block{
    border-top:1px solid rgba(143,163,184,0.25);
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-mute);
    text-transform:uppercase;
    letter-spacing:0.5px;
  }

  .title-block div{
    padding:14px 16px;
    border-right:1px solid rgba(143,163,184,0.25);
  }
  .title-block div:last-child{ border-right:none; }

  .title-block b{
    display:block;
    color:var(--text-main);
    font-size:12px;
    margin-top:4px;
    letter-spacing:0.3px;
  }
</style>
</head>

<body>

<div class="sheet">
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <p class="eyebrow">Automotive &middot; Precision Costing</p>
  <h1>Sheet Metal<br>Costing Engine</h1>
  <p class="subtitle">Nesting-aware material &amp; scrap cost estimation</p>

  <form action="/calculator">
    <button type="submit">Start Calculator →</button>
  </form>

  <div class="title-block">
    <div>Drawn By<b>Ankit Kumar Mishra</b></div>
    <div>Material<b>CR / HR / AL</b></div>
    <div>Rev<b>1.1</b></div>
  </div>
</div>

</body>
</html>
