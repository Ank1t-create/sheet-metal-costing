<!DOCTYPE html>
<html>

<head>

<title>Sheet Weight Calculator</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 15px gray;
}

h1{
    text-align:center;
    color:#0056b3;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    background:#0056b3;
    color:white;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#003d80;
}

.result{
    margin-top:30px;
    background:#d4edda;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Sheet Weight Calculator</h1>

<form method="POST">

<label>Thickness (mm)</label>
<input type="number" step="0.01" name="thickness" required>

<label>Length (mm)</label>
<input type="number" step="0.01" name="length" required>

<label>Width (mm)</label>
<input type="number" step="0.01" name="width" required>

<button type="submit">
Calculate
</button>

</form>

{% if weight %}

<div class="result">

<h2>Result</h2>

<p><b>Sheet Weight:</b> {{weight}} kg</p>

</div>

{% endif %}

</div>

</body>

</html>
