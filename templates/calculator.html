<!DOCTYPE html>
<html>

<head>

<title>Sheet Weight Calculator</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 15px gray;
}

h1{
    text-align:center;
    color:#0056b3;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    background:#0056b3;
    color:white;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#003d80;
}

.result{
    margin-top:30px;
    background:#d4edda;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Sheet Weight</h1>
<p style="text-align:center; color:gray;">
Automotive Cost Estimation Tool
</p>

<form method="POST">
    <label>Material</label>

<select name="material" required>

    <option value="">Select Material</option>

    <option value="CR" {% if material=="CR" %}selected{% endif %}>
        CR Sheet
    </option>

    <option value="HR" {% if material=="HR" %}selected{% endif %}>
        HR Sheet
    </option>

    <option value="AL" {% if material=="AL" %}selected{% endif %}>
        Aluminium Sheet
    </option>

</select>

<label>Thickness (mm)</label>
<input
    type="number"
    step="0.01"
    name="thickness"
    value="{{ thickness }}"
    required>

<label>Length (mm)</label>
<input
    type="number"
    step="0.01"
    name="length"
    value="{{ length }}"
    required>

<label>Width (mm)</label>
<input
    type="number"
    step="0.01"
    name="width"
    value="{{ width }}"
    required>
<label>Blanks per Sheet</label>
<input
    type="number"
    name="blanks_per_sheet"
    value="{{ blanks_per_sheet }}"
    required>

<label>Part Weight (kg)</label>
<input
    type="number"
    step="0.00001"
    min="0.00001"
    max="10"
    name="part_weight"
    value="{{ part_weight }}"
    required>
<label>RM Rate (₹/kg)</label>
<input
    type="number"
    step="0.01"
    name="rm_rate"
    value="{{ rm_rate }}"
    required>

<label>Scrap Rate (₹/kg)</label>
<input
    type="number"
    step="0.01"
    name="scrap_rate"
    value="{{ scrap_rate }}"
    required>


<button type="submit">
Calculate
</button>

</form>

{% if weight %}

<div class="result">

<h2>Result</h2>

<p><b>Sheet Weight:</b> {{ weight }} kg</p>

<p><b>Input Weight:</b> {{ input_weight }} kg</p>

<p><b>Scrap Weight:</b> {{ scrap_weight }} kg</p>

<p><b>RM Cost:</b> ₹ {{ rm_cost }}</p>

<p><b>Scrap Cost:</b> ₹ {{ scrap_cost }}</p>

<p><b>Final RMC:</b> ₹ {{ rmc }}</p>

</div>

{% endif %}

</div>

</body>

</html>
